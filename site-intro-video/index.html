<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <title>大雁个人站视频介绍</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #08090c;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="24"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="beat-1"
        data-composition-id="beat-1-hook"
        data-composition-src="compositions/beat-1-hook.html"
        data-start="0"
        data-duration="4"
        data-track-index="1"
      ></div>
      <div
        id="beat-2"
        data-composition-id="beat-2-identity"
        data-composition-src="compositions/beat-2-identity.html"
        data-start="4"
        data-duration="4.8"
        data-track-index="1"
      ></div>
      <div
        id="beat-3"
        data-composition-id="beat-3-products"
        data-composition-src="compositions/beat-3-products.html"
        data-start="8.8"
        data-duration="4.6"
        data-track-index="1"
      ></div>
      <div
        id="beat-4"
        data-composition-id="beat-4-proof"
        data-composition-src="compositions/beat-4-proof.html"
        data-start="13.4"
        data-duration="4.8"
        data-track-index="1"
      ></div>
      <div
        id="beat-5"
        data-composition-id="beat-5-cta"
        data-composition-src="compositions/beat-5-cta.html"
        data-start="18.2"
        data-duration="5.8"
        data-track-index="1"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
